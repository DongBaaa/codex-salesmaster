name: georaeplan

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-georaeplan}
      POSTGRES_USER: ${POSTGRES_USER:-georaeplan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      TZ: ${TZ:-Asia/Seoul}
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${POSTGRES_HOST_PORT:-15434}:5432"
    volumes:
      - "${NAS_ROOT_PATH:-/volume1/docker/georaeplan}/data/postgres:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-georaeplan} -d ${POSTGRES_DB:-georaeplan}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: mcr.microsoft.com/dotnet/aspnet:8.0
    restart: unless-stopped
    working_dir: /app
    command: ["sh", "-c", "exec dotnet /app/*.Server.Api.dll"]
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Kestrel__Endpoints__Http__Url: http://0.0.0.0:8080
      TZ: ${TZ:-Asia/Seoul}
      Database__EnableSqliteFallback: false
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=${POSTGRES_DB:-georaeplan};Username=${POSTGRES_USER:-georaeplan};Password=${POSTGRES_PASSWORD}
      ConnectionStrings__ITWORLD: Host=postgres;Port=5432;Database=${ITWORLD_POSTGRES_DB:-georaeplan_itworld};Username=${POSTGRES_USER:-georaeplan};Password=${POSTGRES_PASSWORD}
      Jwt__Issuer: ${JWT_ISSUER:-georaeplan}
      Jwt__Audience: ${JWT_AUDIENCE:-georaeplan-client}
      Jwt__SigningKey: ${JWT_SIGNING_KEY:?set in .env}
      Jwt__ExpirationMinutes: ${JWT_EXPIRATION_MINUTES:-480}
      Security__EnableRateLimiting: ${SECURITY_ENABLE_RATE_LIMITING:-true}
      Security__LoginPermitLimitPerMinute: ${SECURITY_LOGIN_PERMIT_LIMIT_PER_MINUTE:-10}
      Security__ApiPermitLimitPerMinute: ${SECURITY_API_PERMIT_LIMIT_PER_MINUTE:-300}
      Security__AddSecurityHeaders: ${SECURITY_ADD_SECURITY_HEADERS:-true}
      Security__RequireHttpsForwardedProto: ${SECURITY_REQUIRE_HTTPS_FORWARDED_PROTO:-true}
      Security__AllowAnyCorsOrigin: ${SECURITY_ALLOW_ANY_CORS_ORIGIN:-false}
      Security__AllowedCorsOrigins__0: ${SECURITY_ALLOWED_CORS_ORIGIN_0:-}
      SeedUsers__EnableSeedUsers: ${SEED_USERS_ENABLE_SEED_USERS:-true}
      SeedUsers__AdminPassword: ${SEED_USERS_ADMIN_PASSWORD:-}
      SeedUsers__UserPassword: ${SEED_USERS_USER_PASSWORD:-}
      SeedUsers__ItwPassword: ${SEED_USERS_ITW_PASSWORD:-}
      SeedUsers__UpdateExistingItwPassword: ${SEED_USERS_UPDATE_EXISTING_ITW_PASSWORD:-true}
      SeedUsers__WarnOnDefaultPasswords: ${SEED_USERS_WARN_ON_DEFAULT_PASSWORDS:-true}
      FileStorage__RootPath: /storage/files
      DataProtection__KeyRingPath: /storage/data-protection-keys
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${API_HOST_PORT:-18082}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - "${NAS_ROOT_PATH:-/volume1/docker/georaeplan}/app/live:/app:ro"
      - "${NAS_ROOT_PATH:-/volume1/docker/georaeplan}/storage/files:/storage/files"
      - "${NAS_ROOT_PATH:-/volume1/docker/georaeplan}/storage/data-protection-keys:/storage/data-protection-keys"
