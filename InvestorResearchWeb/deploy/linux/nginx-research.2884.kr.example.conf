# Optional public reverse proxy snippet for research.2884.kr
# Apply only after DNS/SSL is ready and after checking trade.2884.kr/work.2884.kr/itw.2884.kr impact.
# If the proxy runs on the same Linux PC, use http://127.0.0.1:18088.
# If the proxy runs on another host such as 192.168.0.200, use http://192.168.0.199:18088.

server {
    listen 80;
    server_name research.2884.kr;

    location / {
        proxy_pass http://192.168.0.199:18088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }
}
